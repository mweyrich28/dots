[module-base]
format-background = ${colors.background-alt}
format-padding = 0
format-margin = 0

[module/date]
type = internal/date
inherit = module-base
interval = 4000
date = %d.%m
label ="%date% "
label-foreground = ${colors.foreground}
format-prefix-foreground = ${colors.prefix}
format-background = ${colors.background-alt}
format-prefix = "ïپ³ "

[module/time]
inherit = module-base
type = internal/date
interval = 1
format-background = ${colors.background-alt}
date =%H:%M
format-prefix = " ï€— "
format-prefix-foreground = ${colors.prefix}
label-foreground = ${colors.foreground}
label = "%date%"

[module/volume]
type=internal/pulseaudio
use-ui-max=true
interval=1
format-volume=<ramp-volume><label-volume>
label-volume = "%percentage:3%% "
label-volume-foreground=${colors.foreground}
label-volume-background=${colors.background-alt}
format-muted=<label-muted>
label-muted=" MUTE "
label-muted-background=${colors.background-alt}
label-muted-foreground=${colors.red}
ramp-volume-0 = " َ°•؟ "
ramp-volume-1 = " َ°–€ "
ramp-volume-2 = " َ°•¾ "

ramp-volume-foreground= ${colors.prefix}
ramp-volume-background= ${colors.background-alt}

[module/battery]
type = internal/battery
full-at = 76
battery = BAT0
adapter = AC
poll-interval = 80
time-format = %H:%M
format-charging = <ramp-capacity><label-charging>
format-charging-prefix-background = ${colors.background-alt}
format-charging-prefix-padding = 1
format-discharging = <ramp-capacity><label-discharging>


label-charging ="%percentage%"
label-charging-background = ${colors.background-alt}
label-charging-foreground = ${colors.green}
label-discharging-foreground = ${colors.foreground}
label-charging-padding = 1
label-discharging ="%percentage%"
label-discharging-background = ${colors.background-alt}
label-discharging-padding = 1


format-full = <ramp-capacity><label-full>

label-full = "FULL"
label-full-foreground = ${colors.green}
label-full-background = ${colors.background-alt}
label-full-padding = 1

label-capacity = 100
label-capacity-foreground = ${colors.foreground}
label-capacity-background = ${colors.background}

ramp-capacity-0 = " َ°پ؛"
ramp-capacity-1 = " َ°پ»"
ramp-capacity-2 = " َ°پ¼"
ramp-capacity-3 = " َ°پ½"
ramp-capacity-4 = " َ°پ¾"
ramp-capacity-5 = " َ°پ؟"
ramp-capacity-6 = " َ°‚€"
ramp-capacity-7 = " َ°‚پ"
ramp-capacity-8 = " َ°‚‚"
ramp-capacity-9 = " َ°پ¹"
ramp-capacity-foreground= ${colors.prefix}
ramp-capacity-background= ${colors.background-alt}

[module/backlight]
type = custom/script

exec = brightnessctl | grep -oP '\\(\\K[^%]*'
interval = 1

format = <label>
format-prefix = َ±،‍
format-prefix-foreground = ${colors.prefix}
format-prefix-background = ${colors.background-alt}
format-foreground = ${colors.foreground}
format-background = ${colors.background-alt}
format-prefix-padding = 1

label = " %output% "
scroll-up = brightnessctl set +1% 
scroll-down = brightnessctl set 1%-


[module/tray]
type = internal/tray
format-background = ${colors.background}
tray-background = ${colors.background}
format-padding = 0
tray-padding = 0
tray-spacing = 5
tray-size = 14

[module/github-notifications]
type = custom/script
format-prefix-foreground = ${colors.prefix}
format-foreground = ${colors.foreground}
format-background = ${colors.background-alt}
format-prefix = " î®، "
label = " %output% "
exec = python3 ~/.config/polybar/scripts/github_notifications.py
interval = 300
click-left = brave-browser --new-tab https://github.com/notifications



[module/keyboard]
type = internal/xkeyboard

blacklist-0 = num lock
blacklist-1 = scroll lock

format = <label-layout> <label-indicator>
format-prefix = َ°ŒŒ
format-prefix-foreground = ${colors.prefix}
format-prefix-padding = 1

format-foreground = ${colors.foreground}
format-background = ${colors.background-alt}

label-layout = "%layout%"
label-layout-padding = 1

label-indicator-on = "ïƒˆ"
label-indicator-on-background = ${colors.background-alt}
label-indicator-on-foreground = ${colors.prefix}

[module/workspaces]
type = custom/script
exec = cat /tmp/polybar-tags
tail = true
interval = 1
label = %output%
label-foreground = ${colors.foreground}
label-background = ${colors.background}

[module/os]
type = custom/text
label = " îœ؛ "
label-font=4
format-background = ${colors.background-alt}
format-foreground = ${colors.prefix}


[module/storage]
type = internal/fs
mount-0 = /
interval = 60
fixed-values = true
spacing = 4
warn-percentage = 75
format-mounted-prefix-foreground = ${colors.prefix}
format-mounted-prefix-background = ${colors.background-alt}
format-mounted-prefix = " َ°‹ٹ "
label-mounted = "%percentage_used%% "
format-mounted-foreground = ${colors.foreground}
format-mounted-background = ${colors.background-alt}
